apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: triton-models
  namespace: triton
  labels:
    app.kubernetes.io/name: triton
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi  # Default model ~7.5 GB; sized for multiple models
  # storageClassName: <your-storage-class>  # Set to match your cluster (e.g. gp3, standard-rwo)
